version: '3.8'

# Main docker-compose for local development

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coder-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=False
      - DATABASE_URL=sqlite:////app/data/coder.db
      - PORT=5000
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - coder-network

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: coder-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:5000
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - coder-network

networks:
  coder-network:
    driver: bridge

volumes:
  backend_data:
