version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coder-frontend
    ports:
      - "${PORT:-5173}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - bitcoin-network
    depends_on:
      - backend

  # Optional: Include backend for local development
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: coder-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=False
      - DATABASE_URL=sqlite:////app/data/coder.db
      - PORT=5000
    volumes:
      - ../backend/data:/app/data
      - ../backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bitcoin-network

networks:
  bitcoin-network:
    driver: bridge
