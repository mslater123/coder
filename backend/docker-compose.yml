version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coder-backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/coder.db}
      - PORT=5000
    volumes:
      - ./data:/app/data
      - .:/app
    # GPU access - uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - coder-network

networks:
  coder-network:
    driver: bridge

volumes:
  backend_data:
